<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Nhỏ</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a2a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .stars { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        @keyframes fall { 0% { transform: translateY(-10vh) scale(0); opacity: 0;} 50% {opacity: 1; transform: translateY(50vh) scale(1);} 100% { transform: translateY(110vh) scale(0); opacity: 0;} }
        .star { position: absolute; background: white; border-radius: 50%; animation: fall linear infinite; box-shadow: 0 0 5px #fff; }
        
        .container { text-align: center; z-index: 10; position: relative; width: 100%; padding: 20px; box-sizing: border-box; }
        
        #envelope-stage { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: opacity 0.5s ease; }
        .heart { font-size: 100px; text-shadow: 0 0 20px #ff4d4d; animation: beat 0.8s infinite alternate; user-select: none; }
        @keyframes beat { from { transform: scale(1); } to { transform: scale(1.15); } }
        .click-text { margin-top: 30px; font-size: 1.2em; letter-spacing: 1.5px; opacity: 0.8; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; } }

        #video-stage { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; margin: 0 auto; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        video { width: 100%; border-radius: 15px; box-shadow: 0 0 25px rgba(255, 77, 77, 0.4); margin-bottom: 25px; border: 2px solid #ff8080; background: #000; }
        .message { font-size: 1.3em; line-height: 1.5; color: #ffe6e6; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="stars" id="stars-container"></div>

    <div class="container">
        <div id="envelope-stage" onclick="openGift()">
            <div class="heart">❤️</div>
            <div class="click-text">Chạm vào trái tim nhé!</div>
        </div>

        <div id="video-stage">
            <video id="myVideo" controls playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
            <div class="message">
                Chúc mừng ngày Quốc tế Phụ nữ! 🌸<br>
                Cảm ơn em vì đã luôn đồng hành cùng anh.
            </div>
        </div>
    </div>

    <script>
        // JS tạo hiệu ứng sao bay
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 80; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            let size = Math.random() * 3 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * -100 + 'vh'; 
            star.style.animationDuration = Math.random() * 4 + 3 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }

        // JS xử lý sự kiện click mở video
        function openGift() {
            document.getElementById('envelope-stage').style.display = 'none';
            document.getElementById('video-stage').style.display = 'flex';
            const vid = document.getElementById('myVideo');
            vid.play().catch(function(error) {
                console.log("Trình duyệt yêu cầu tương tác thêm để phát âm thanh.");
            });
        }
    </script>
</body>

</html>
